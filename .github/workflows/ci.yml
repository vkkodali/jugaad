name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest
      - name: Check lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
