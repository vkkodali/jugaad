[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "jugaad"
version = "0.0.0"
description = "Small bioinformatics command line utilities."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
jugaad = "jugaad.cli:main"

[dependency-groups]
dev = [
    "commitizen>=4.16.0",
    "pre-commit>=4.6.0",
    "pytest>=8.0",
    "python-semantic-release>=10.5.3",
    "ruff>=0.14.0",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.0.0"
tag_format = "v$version"

[tool.semantic_release]
allow_zero_version = true
build_command = "uv build"
commit_message = "chore(release): v{version} [skip ci]\n\nAutomatically generated by python-semantic-release"
commit_parser = "conventional"
tag_format = "v{version}"
version_toml = ["pyproject.toml:project.version"]
version_variables = ["src/jugaad/__init__.py:__version__"]

[tool.semantic_release.branches.main]
match = "main"
prerelease = false

[tool.semantic_release.changelog]
exclude_commit_patterns = ["^chore\\(release\\):"]

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
# LevelBump.PATCH; python-semantic-release expects this enum as an integer.
default_bump_level = 2
